[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache_forge"
solc_version = "0.8.20"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fs_permissions = [{ access = "read", path = "./" }]

remappings = [
  "forge-std/=lib/forge-std/src/",
  "openzeppelin-contracts/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
polkadot_hub_testnet = "https://services.polkadothub-rpc.com/testnet"

[etherscan]
polkadot_hub_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer-polkadot-hub.parity-testnet.parity.io/api" }
